apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
        - name: api-gateway

          image: dockermspyq/api-gateway:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 8085

          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://registry-service:8761/eureka